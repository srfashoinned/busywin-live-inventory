<!DOCTYPE html>
<html>
<head>
<title>SR Psd Inventory</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#f4f6f8;
margin:10px;
}

.container{
max-width:1200px;
margin:auto;
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

h1{
text-align:center;
cursor:pointer;
}

.search-box{
display:flex;
gap:10px;
margin-bottom:10px;
}

.search-box input{
flex:1;
padding:10px;
font-size:16px;
}

table{
width:100%;
border-collapse:collapse;
font-size:14px;
}

th{
background:#27ae60;
color:white;
padding:8px;
}

td{
padding:8px;
border-bottom:1px solid #ddd;
}

.col-wholesale{
background:#e8fff1;
font-weight:bold;
}

.col-purchase{
background:#ffecec;
font-weight:bold;
color:#c0392b;
}

.stock-low{
color:red;
font-weight:bold;
}

/* MOBILE */

@media(max-width:768px){

table{
font-size:11px;
}

th,td{
padding:5px;
}

.col-name{
max-width:100px;
word-break:break-word;
}

}

</style>
</head>

<body>

<div class="container">

<h1 ondblclick="adminLogin()">SR Psd Inventory</h1>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Search item">
<button onclick="loadItems()">Refresh</button>
</div>

<div id="itemsContainer">Loading...</div>

</div>

<!-- ADMIN LOGIN -->

<div id="adminBox" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
align-items:center;
justify-content:center">

<div style="background:white;padding:30px;border-radius:10px;text-align:center">

<h3>Admin Login</h3>

<input id="adminPass"
type="password"
inputmode="numeric"
pattern="[0-9]*"
placeholder="Password"
style="padding:10px;font-size:18px;text-align:center">

<br><br>

<button onclick="checkAdmin()">Login</button>

</div>

</div>

<script>

let items=[]
let isAdmin=false

async function loadItems(){

const response = await fetch(
"https://raw.githubusercontent.com/srfashoinned/busywin-live-inventory/main/items.json"
)

items = await response.json()

displayItems(items)

}

function displayItems(data){

let html="<table>"

html+="<tr>"
html+="<th>Item</th>"
html+="<th>Barcode</th>"
html+="<th>Stock</th>"
html+="<th>MRP</th>"
html+="<th>Sale</th>"
html+="<th>Wholesale</th>"

if(isAdmin){
html+="<th>Purchase</th>"
}

html+="</tr>"

data.forEach(item=>{

let stock=parseFloat(item.Stock||0)

let stockClass=stock<10?"stock-low":""

html+=`<tr data-name="${(item.ItemName||'').toLowerCase()}">

<td>${item.ItemName}</td>

<td>${item.ItemAlias||'-'}</td>

<td class="${stockClass}">${stock}</td>

<td>₹ ${item.Item_MRP}</td>

<td>₹ ${item.Item_Sale_Price}</td>

<td class="col-wholesale">₹ ${item.Item_SelfVal_Price}</td>

${isAdmin ? `<td class="col-purchase">₹ ${item.Item_Purchase_Price}</td>` : ``}

</tr>`

})

html+="</table>"

document.getElementById("itemsContainer").innerHTML=html

setupSearch()

}

function setupSearch(){

document.getElementById("searchInput").addEventListener("keyup",function(){

let search=this.value.toLowerCase()

let rows=document.querySelectorAll("table tr")

rows.forEach(row=>{

if(row.innerText.toLowerCase().includes(search)){
row.style.display=""
}
else{
row.style.display="none"
}

})

})

}

/* ADMIN LOGIN */

function adminLogin(){
document.getElementById("adminBox").style.display="flex"
}

function checkAdmin(){

let pass=document.getElementById("adminPass").value

if(pass==="7865"){
isAdmin=true
document.getElementById("adminBox").style.display="none"
displayItems(items)
}
else{
alert("Wrong password")
}

}

/* AUTO REFRESH */

setInterval(loadItems,30000)

loadItems()

</script>

</body>
</html>
