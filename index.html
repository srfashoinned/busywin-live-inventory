<!DOCTYPE html>
<html>
<head>
<title>SR Psd - Live Inventory</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#f4f6f8;
margin:20px;
}

.container{
max-width:1400px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

h1{
text-align:center;
color:#2c3e50;
cursor:pointer;
}

.last-updated{
text-align:center;
margin-bottom:20px;
color:#777;
}

.search-box{
display:flex;
gap:10px;
margin-bottom:15px;
flex-wrap:wrap;
}

.search-box input{
flex:3;
padding:12px;
font-size:16px;
border:2px solid #ddd;
border-radius:5px;
}

.search-box button{
padding:12px 25px;
background:#2ecc71;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
font-weight:bold;
}

.search-box button:hover{
background:#27ae60;
}

.stats{
background:#ecf9f1;
padding:10px;
border-radius:5px;
margin-bottom:10px;
display:flex;
gap:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#2ecc71;
color:white;
padding:12px;
text-align:left;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
}

/* column colors */

.col-name{background:#f8f9fa;font-weight:bold;}
.col-barcode{background:#eef5ff;font-weight:bold;}
.col-group{background:#f9f9f9;}
.col-stock{background:#fff6e5;}
.col-mrp{background:#fdeaea;}
.col-sale{background:#eaf7ff;font-weight:bold;}
.col-wholesale{background:#e8fff1;font-weight:bold;color:#1e7e34;}
.col-purchase{background:#fff0f0;font-weight:bold;color:#c0392b;}

.stock-low{
color:red;
font-weight:bold;
}

tr:hover{
background:#fafafa;
}

.loading{
text-align:center;
padding:40px;
font-size:18px;
}

/* ADMIN POPUP */

.admin-popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
align-items:center;
justify-content:center;
}

.admin-box{
background:white;
padding:30px;
border-radius:10px;
text-align:center;
}

.admin-box input{
padding:10px;
font-size:20px;
text-align:center;
}

</style>
</head>

<body>

<div class="container">

<h1 ondblclick="openAdmin()">📦 SR Psd Inventory</h1>

<div class="last-updated" id="lastUpdated">Loading inventory...</div>

<div class="search-box">

<input type="text" id="searchInput" placeholder="Search item or scan barcode">

<button onclick="window.location.reload()">🔄 Refresh</button>

</div>

<div class="stats">
<span>Total Items: <b id="totalCount">0</b></span>
<span>Showing: <b id="visibleCount">0</b></span>
</div>

<div id="itemsContainer">
<div class="loading">Loading items from GitHub...</div>
</div>

</div>

<!-- ADMIN LOGIN -->

<div id="adminLogin" class="admin-popup">

<div class="admin-box">

<h2>Admin Login</h2>

<input
type="password"
id="adminPass"
placeholder="Enter Password"
inputmode="numeric"
pattern="[0-9]*"
/>

<br><br>

<button onclick="checkAdmin()">Login</button>

</div>

</div>

<script>

let items=[]
let isAdmin=false

async function loadItems(){

try{

const response = await fetch(
"https://raw.githubusercontent.com/srfashoinned/busywin-live-inventory/main/items.json"
)

items = await response.json()

document.getElementById("lastUpdated").innerHTML =
"Last updated: "+ new Date().toLocaleString()

displayItems(items)

}
catch(e){

document.getElementById("itemsContainer").innerHTML =
"<div class='loading'>Failed to load data</div>"

}

}

function displayItems(data){

let html="<table>"

html+="<thead><tr>"

html+="<th>Item Name</th>"
html+="<th>Barcode</th>"
html+="<th>Group</th>"
html+="<th>Stock</th>"
html+="<th>MRP</th>"
html+="<th>Sale Price</th>"
html+="<th>Wholesale</th>"

if(isAdmin){
html+="<th>Purchase</th>"
}

html+="</tr></thead><tbody>"

data.forEach(item=>{

let stock=parseFloat(item.Stock||0)

let stockClass=stock<10?"stock-low":""

html+=`<tr data-name="${(item.ItemName||'').toLowerCase()}" 
data-alias="${(item.ItemAlias||'').toLowerCase()}">

<td class="col-name">${item.ItemName||''}</td>

<td class="col-barcode">${item.ItemAlias||'-'}</td>

<td class="col-group">${item.GroupName||'-'}</td>

<td class="col-stock ${stockClass}">${stock.toFixed(2)}</td>

<td class="col-mrp">₹ ${parseFloat(item.Item_MRP||0).toFixed(2)}</td>

<td class="col-sale">₹ ${parseFloat(item.Item_Sale_Price||0).toFixed(2)}</td>

<td class="col-wholesale">₹ ${parseFloat(item.Item_SelfVal_Price||0).toFixed(2)}</td>

${isAdmin ? `<td class="col-purchase">₹ ${parseFloat(item.Item_Purchase_Price||0).toFixed(2)}</td>` : ``}

</tr>`

})

html+="</tbody></table>"

document.getElementById("itemsContainer").innerHTML=html

document.getElementById("totalCount").innerText=data.length

document.getElementById("visibleCount").innerText=data.length

setupSearch()

}

function setupSearch(){

document.getElementById("searchInput").addEventListener("keyup",function(){

let search=this.value.toLowerCase()

let rows=document.querySelectorAll("#itemsContainer tbody tr")

let visible=0

rows.forEach(row=>{

let name=row.dataset.name
let alias=row.dataset.alias

if(name.includes(search)||alias.includes(search)){
row.style.display=""
visible++
}
else{
row.style.display="none"
}

})

document.getElementById("visibleCount").innerText=visible

})

}

/* ADMIN LOGIN */

function openAdmin(){
document.getElementById("adminLogin").style.display="flex"
}

function checkAdmin(){

let pass=document.getElementById("adminPass").value

if(pass==="7865"){
isAdmin=true
document.getElementById("adminLogin").style.display="none"
displayItems(items)
}
else{
alert("Wrong Password")
}

}

loadItems()

</script>

</body>
</html>
