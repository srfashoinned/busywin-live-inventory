<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SR Psd Inventory</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f8;
}

.container{
padding:10px;
}

h1{
text-align:center;
cursor:pointer;
}

.search{
width:100%;
padding:12px;
font-size:16px;
margin-bottom:10px;
box-sizing:border-box;
}

button{
padding:10px;
margin-bottom:10px;
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

th{
background:#27ae60;
color:white;
padding:6px;
}

td{
padding:6px;
border-bottom:1px solid #ddd;
}

/* column colors */

.col-wholesale{
background:#e8fff1;
font-weight:bold;
color:#1e7e34;
}

.col-purchase{
background:#ffecec;
color:#c0392b;
font-weight:bold;
}

.stock-low{
color:red;
font-weight:bold;
}

/* mobile */

@media(max-width:600px){

table{
font-size:11px;
}

th,td{
padding:4px;
word-break:break-word;
}

}

</style>
</head>

<body>

<div class="container">

<h1 ondblclick="openAdmin()">SR Psd Inventory</h1>

<input id="searchBox" class="search" placeholder="Search item">

<button onclick="loadItems()">Refresh</button>

<div id="table">Loading...</div>

</div>

<!-- ADMIN LOGIN -->

<div id="adminPopup" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
align-items:center;
justify-content:center">

<div style="background:white;padding:20px;border-radius:10px;text-align:center">

<h3>Admin Login</h3>

<input id="pass"
type="password"
inputmode="numeric"
pattern="[0-9]*"
placeholder="Password"
style="padding:10px;font-size:18px;text-align:center">

<br><br>

<button onclick="login()">Login</button>

</div>

</div>

<script>

let items=[]
let isAdmin=false

async function loadItems(){

try{

const r = await fetch(
"http://127.0.0.1:5001/items?nocache="+Date.now()
)

items = await r.json()

render(items)

}catch(e){

document.getElementById("table").innerHTML="API not running"

}

}

function render(data){

let html="<table>"

html+="<tr>"
html+="<th>Item</th>"
html+="<th>Barcode</th>"
html+="<th>Stock</th>"
html+="<th>MRP</th>"
html+="<th>Sale</th>"
html+="<th>Wholesale</th>"

if(isAdmin){
html+="<th>Purchase</th>"
}

html+="</tr>"

data.forEach(i=>{

let stock=parseFloat(i.Stock||0)

let stockClass=stock<10?"stock-low":""

html+=`<tr>

<td>${i.ItemName}</td>

<td>${i.ItemAlias||''}</td>

<td class="${stockClass}">${stock}</td>

<td>₹ ${i.Item_MRP}</td>

<td>₹ ${i.Item_Sale_Price}</td>

<td class="col-wholesale">₹ ${i.Item_SelfVal_Price}</td>

${isAdmin ? `<td class="col-purchase">₹ ${i.Item_Purchase_Price}</td>` : ``}

</tr>`

})

html+="</table>"

document.getElementById("table").innerHTML=html

}

document.getElementById("searchBox").addEventListener("input",function(){

let q=this.value.toLowerCase()

let filtered=items.filter(i=>
(i.ItemName||"").toLowerCase().includes(q) ||
(i.ItemAlias||"").toLowerCase().includes(q)
)

render(filtered)

})

/* ADMIN LOGIN */

function openAdmin(){
document.getElementById("adminPopup").style.display="flex"
}

function login(){

if(document.getElementById("pass").value==="7865"){
isAdmin=true
document.getElementById("adminPopup").style.display="none"
render(items)
}else{
alert("Wrong password")
}

}

loadItems()

</script>

</body>
</html>
